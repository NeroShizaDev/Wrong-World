name: Android Debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - work
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'capacitor.config.ts'
      - '.github/workflows/android-debug-apk.yml'

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install web dependencies
        run: npm ci

      - name: Build Vite web app
        run: npm run build

      - name: Install Capacitor packages
        run: npm install @capacitor/core @capacitor/cli @capacitor/android --save

      - name: Add Android platform if missing
        run: |
          if [ ! -d android ]; then
            npx cap add android
          else
            echo "android/ already exists; skipping cap add"
          fi

      - name: Sync web build into Android project
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wrong-world-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
